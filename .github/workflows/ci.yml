name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Go (vet + test -race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # dist/ is gitignored; ensure-embed drops .gitkeep for //go:embed.
      - run: make vet
      - run: make test

  frontend:
    name: WebUI (typecheck + build into embed dir)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build # vue-tsc + vite → ../internal/webui/dist
      - name: Assert stable embed entrypoints
        run: |
          test -f ../internal/webui/dist/index.html
          test -f ../internal/webui/dist/assets/app.js
          test -f ../internal/webui/dist/assets/app.css
          grep -q '/assets/app.js' ../internal/webui/dist/index.html
